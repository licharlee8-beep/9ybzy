<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>长大了干什么 - 搜职业查专业 - 久元报志愿选专业</title>
<meta name="description" content="输入你想做的职业，告诉你该学什么专业、走什么路。医生、程序员、律师、教师……查一查你的理想职业需要什么专业。">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }

.header {
  background: linear-gradient(135deg, #D97706, #F59E0B);
  color: #fff;
  text-align: center;
  padding: 40px 20px 50px;
}
.header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.header p { font-size: 15px; opacity: 0.9; }

.search-box {
  max-width: 500px;
  margin: -25px auto 0;
  padding: 0 16px;
  position: relative;
  z-index: 10;
}
.search-box input {
  width: 100%;
  padding: 16px 20px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  outline: none;
}
.search-box input:focus { box-shadow: 0 4px 25px rgba(217,119,6,0.2); }

.hot-tags {
  max-width: 500px;
  margin: 14px auto 0;
  padding: 0 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.hot-tags span {
  padding: 6px 14px;
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 20px;
  font-size: 13px;
  color: #666;
  cursor: pointer;
  transition: all 0.15s;
}
.hot-tags span:hover { border-color: #D97706; color: #D97706; }

.container { max-width: 600px; margin: 0 auto; padding: 24px 16px; }

/* 空白状态 */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: #ccc;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* 搜索结果 */
.result-card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.result-card .career-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}
.result-card .career-desc {
  font-size: 14px;
  color: #888;
  margin-bottom: 14px;
}

.result-card .section-title {
  font-size: 14px;
  font-weight: 600;
  color: #D97706;
  margin: 14px 0 8px;
}

.result-card .major-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.result-card .major-tag {
  padding: 5px 12px;
  background: #FFF8F0;
  border: 1px solid #FDE8C8;
  border-radius: 6px;
  font-size: 13px;
  color: #D97706;
}

.result-card .path-text {
  font-size: 14px;
  line-height: 1.7;
  color: #555;
}

.result-card .note-box {
  margin-top: 12px;
  padding: 10px 14px;
  background: #F9FAFB;
  border-radius: 6px;
  font-size: 13px;
  color: #888;
  line-height: 1.5;
}

.result-card .note-box::before {
  content: '💡 ';
}

/* 底部推荐 */
.cta-box {
  text-align: center;
  padding: 24px 16px;
  background: #fff;
  border-radius: 12px;
  border: 1px solid #eee;
  margin-top: 8px;
}
.cta-box p { font-size: 14px; color: #666; margin-bottom: 12px; }
.cta-box a {
  display: inline-block;
  padding: 10px 28px;
  background: #D97706;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-size: 15px;
}

.footer { text-align: center; font-size: 12px; color: #bbb; padding: 24px 0 40px; }

@media (max-width: 480px) {
  .header h1 { font-size: 22px; }
  .header { padding: 30px 16px 40px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🔍 长大了干什么</h1>
  <p>搜一个职业，看看该学什么专业、怎么走</p>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="搜一个职业，比如「医生」「程序员」…" autocomplete="off">
</div>

<div class="hot-tags" id="hotTags"></div>

<div class="container" id="results"></div>

<script>
// 职业数据
const data = [
  {c:'医生',d:'在医院诊断治疗疾病',m:['临床医学','口腔医学','医学影像学','麻醉学','中医学','儿科学'],p:'高中选理科 → 本科临床医学(5年) → 规培3年 → 住院医师 → 主治医师',n:'医学专业5年起，三甲医院普遍要求硕士以上'},
  {c:'护士',d:'在医院从事护理工作',m:['护理学','助产学'],p:'本科护理学 → 考护士资格证 → 临床护理 → 护师/主管护师',n:'护理学就业率很高，专科本科都有对应的入行路径'},
  {c:'程序员',d:'写代码开发软件和网站',m:['计算机科学与技术','软件工程','数据科学与大数据技术','人工智能'],p:'本科计算机相关 → 掌握一门编程语言 → 实习 → 开发工程师 → 架构师',n:'不考研也能找到好工作，更看重项目经验和编程能力'},
  {c:'教师',d:'在中小学或大学教书',m:['教育学','汉语言文学','数学与应用数学','英语','物理学','化学'],p:'本科师范类 → 考教师资格证 → 考教师编制 → 中小学教师 → 高级教师',n:'想当公办老师建议报师范类专业，考编要提前准备'},
  {c:'律师',d:'为当事人提供法律服务',m:['法学','知识产权'],p:'本科法学 → 通过法考 → 律所实习1年 → 执业律师 → 合伙人',n:'法考通过率约15%，是必须跨过的门槛。名校+过法考是关键'},
  {c:'会计',d:'做账、报税、审计',m:['会计学','财务管理','审计学'],p:'本科会计学 → 考初级会计 → 企业财务/事务所 → 考CPA → 财务经理',n:'入门不难，想拿高薪必须考CPA(注册会计师)，越老越吃香'},
  {c:'建筑师',d:'设计建筑，画图纸',m:['建筑学','城乡规划','风景园林'],p:'本科建筑学(5年) → 实习积累作品 → 考一级注册建筑师 → 主创建筑师',n:'建筑学本科就是5年制，需要一定美术基础'},
  {c:'金融分析师',d:'分析金融市场，做投资',m:['金融学','经济学','投资学','金融工程'],p:'本科金融/经济 → 考CFA证书 → 券商/基金/银行 → 分析师/基金经理',n:'金融行业很看学历，名校硕士起步是常态'},
  {c:'产品经理',d:'设计互联网产品功能',m:['工商管理','信息管理与信息系统','计算机科学与技术','心理学'],p:'本科相关专业 → 实习积累经验 → 初级PM → 高级PM/产品总监',n:'产品经理没有绝对对口专业，沟通能力和逻辑比编程重要'},
  {c:'设计师',d:'做视觉/UI/品牌设计',m:['视觉传达设计','环境设计','产品设计','数字媒体艺术'],p:'本科设计专业 → 掌握设计工具 → 实习 → 设计师 → 设计总监',n:'设计专业需要作品集，真正靠的是审美和项目经验'},
  {c:'公务员',d:'在政府机关工作',m:['行政管理','公共事业管理','法学','汉语言文学','经济学'],p:'本科毕业 → 参加公务员考试 → 笔试面试通过 → 入职 → 晋升',n:'公务员考试不限专业，但法学、汉语言、经济类招录名额最多'},
  {c:'市场营销',d:'做品牌推广和策划',m:['市场营销','广告学','电子商务'],p:'本科市场营销 → 从执行岗做起 → 市场经理 → 市场总监',n:'市场营销看重实战经验，在校期间多做实习比什么都重要'},
  {c:'人力资源',d:'负责招聘培训等HR工作',m:['人力资源管理','劳动与社会保障','工商管理'],p:'本科人力资源 → 企业HR专员 → HR经理 → HR总监',n:'入门门槛不高，做到高层需要懂业务'},
  {c:'土木工程师',d:'建造桥梁道路楼房',m:['土木工程','工程管理','工程造价'],p:'本科土木工程 → 考建造师 → 施工/设计院 → 项目经理',n:'土木就业率一直不错，但工作环境相对艰苦'},
  {c:'电气工程师',d:'电力系统自动化控制',m:['电气工程及其自动化','自动化','电子信息工程'],p:'本科电气工程 → 考注册电气工程师 → 国家电网/设计院 → 高级工程师',n:'进国家电网是很多人的首选，对口且稳定'},
  {c:'心理咨询师',d:'帮助解决心理问题',m:['心理学','应用心理学'],p:'本科心理学 → 考心理咨询师证书 → 积累咨询时长 → 独立执业',n:'心理学本科就业不太容易，建议读到硕士'},
  {c:'记者',d:'采访新闻写报道',m:['新闻学','广播电视学','传播学','汉语言文学'],p:'本科新闻/传播 → 实习积累 → 媒体机构入行 → 记者/编辑/主编',n:'传统媒体在转型，新媒体机会更多。写作能力比学历重要'},
  {c:'电商运营',d:'运营网店做推广销售',m:['电子商务','市场营销','国际经济与贸易'],p:'本科相关专业 → 运营助理 → 运营专员 → 店长/运营总监',n:'电商变化快，实操经验比学历重要'},
  {c:'翻译',d:'中英文口译笔译',m:['翻译','英语','日语','法语','德语','西班牙语'],p:'本科语言专业 → 考CATTI翻译证 → 企业翻译/自由译员 → 高级翻译/同传',n:'AI冲击大，建议往口译/同传方向发展'},
  {c:'游戏开发',d:'设计开发电子游戏',m:['数字媒体技术','计算机科学与技术','软件工程','动画'],p:'本科相关专业 → 学习游戏引擎(Unity/虚幻) → 游戏公司实习 → 初级开发',n:'游戏行业加班多但氛围好，建议在校就开始做小游戏'},
  {c:'自媒体博主',d:'在抖音/B站做内容',m:['广播电视学','传播学','数字媒体艺术','市场营销'],p:'找到内容方向 → 持续输出 → 积累粉丝 → 商业化变现',n:'自媒体没有固定入行路径，内容感比学历重要'},
  {c:'药剂师',d:'在医院或药店配药',m:['药学','临床药学','中药学'],p:'本科药学 → 考执业药师 → 医院药房/药店/药企 → 主管药师',n:'药学就业选择多：医院、药店、药企都可以'},
  {c:'兽医',d:'给动物看病治疗',m:['动物医学','动物药学'],p:'本科动物医学(5年) → 考执业兽医师 → 宠物医院 → 主治兽医',n:'宠物经济兴起，宠物医生收入越来越好'},
  {c:'飞行员',d:'驾驶民航客机',m:['飞行技术','交通运输(民航)'],p:'本科飞行技术 → 航校培训 → 副驾驶 → 机长',n:'飞行技术招生有严格体检要求，视力是关键'},
  {c:'数据分析师',d:'从数据中找规律',m:['统计学','数据科学与大数据技术','信息管理与信息系统'],p:'本科统计/数据 → 掌握SQL/Python → 实习 → 数据分析师 → 数据科学家',n:'各行业都需要，数学基础好的有优势'},
  {c:'导演',d:'拍摄电影电视剧',m:['广播电视编导','戏剧影视导演','电影学'],p:'本科相关专业(艺考) → 跟组实习 → 助理导演 → 导演',n:'导演专业需要艺考，入行靠作品和人脉'},
  {c:'动画师',d:'制作动画和特效',m:['动画','数字媒体艺术','数字媒体技术'],p:'本科动画/数媒 → 掌握Maya/Blender → 动画公司 → 动画师/主美',n:'国产动画崛起中，人才缺口大'},
  {c:'警察',d:'维护社会治安',m:['治安学','侦查学','刑事科学技术','公安管理学'],p:'报考公安院校(提前批) → 公安联考 → 入职公安机关 → 晋升',n:'报公安院校参加联考，入警率超过90%'},
  {c:'法官',d:'在法院审理案件',m:['法学'],p:'本科法学 → 通过法考 → 考公务员(法院) → 书记员 → 法官',n:'需通过公务员考试进入法院，从书记员做起'},
  {c:'物流管理',d:'管理仓储运输供应链',m:['物流管理','物流工程','供应链管理'],p:'本科物流相关 → 物流企业/电商仓配 → 主管 → 经理/总监',n:'电商发展带动物流行业，就业机会多'},
  {c:'营养师',d:'提供饮食营养建议',m:['食品科学与工程','食品质量与安全','营养学'],p:'本科相关专业 → 考注册营养师 → 医院/健身/食品企业 → 高级营养师',n:'健康意识提升，营养师需求在增长'},
  {c:'体育教练',d:'训练运动员或健身教练',m:['体育教育','运动训练','运动人体科学'],p:'本科体育专业(体育统考) → 考教练证 → 学校/俱乐部 → 主教练',n:'体育专业需通过体育考试入学'},
  {c:'精算师',d:'保险公司风险定价',m:['精算学','保险学','统计学','数学与应用数学'],p:'本科精算/统计 → 考精算师证 → 保险公司 → 总精算师',n:'精算师考试周期长(5-10年)，通过后收入很高'},
  {c:'通信工程师',d:'通信网络设计优化',m:['通信工程','电子信息工程','信息工程'],p:'本科通信工程 → 华为/中兴/运营商 → 初级工程师 → 高级工程师',n:'5G/6G发展带动行业需求，大厂薪资高'}
];

const hotList = ['医生','程序员','教师','公务员','律师','会计','设计师','自媒体博主'];

// 渲染热门标签
const tagContainer = document.getElementById('hotTags');
hotList.forEach(c => {
  const span = document.createElement('span');
  span.textContent = c;
  span.onclick = () => { document.getElementById('searchInput').value = c; doSearch(c); };
  tagContainer.appendChild(span);
});

function doSearch(query) {
  const container = document.getElementById('results');
  const trimmed = query.trim();
  if (!trimmed) { container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>输入一个职业，看看该学什么</p></div>'; return; }

  const results = data.filter(item => item.c.includes(trimmed));
  if (results.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🤔</div><p>没找到「${trimmed}」，试试搜「医生」「程序员」等常见职业</p></div>`;
    return;
  }

  container.innerHTML = results.map(item => `
    <div class="result-card">
      <div class="career-title">${item.c}</div>
      <div class="career-desc">${item.d}</div>
      <div class="section-title">📚 对应专业</div>
      <div class="major-tags">${item.m.map(m => `<span class="major-tag">${m}</span>`).join('')}</div>
      <div class="section-title">🛤️ 成长路径</div>
      <div class="path-text">${item.p}</div>
      <div class="note-box">${item.n}</div>
    </div>
  `).join('') + `
    <div class="cta-box">
      <p>想知道你的分数能上其中哪个学校？</p>
      <a href="/">用久元报志愿查一查 →</a>
    </div>
  `;
}

// 输入搜索
const input = document.getElementById('searchInput');
input.addEventListener('input', e => doSearch(e.target.value));

// 初始显示
doSearch('');
</script>

<div class="footer">
  <p>久元报志愿选专业 · 数据仅供参考，请以各院校招生简章为准</p>
</div>

</body>
</html>
